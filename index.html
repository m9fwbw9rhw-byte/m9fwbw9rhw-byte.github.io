<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grapevine Garden - YouTube</title>
    <style>
        body {
            font-family: Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }

        .channel-header {
            width: 100%;
        }

        .channel-banner {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: cover;
        }

        .channel-info-bar {
            background-color: white;
            padding: 16px 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e1e1e1;
        }

        .channel-info-left {
            display: flex;
            align-items: center;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-right: 24px;
        }

        .channel-name {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
        }

        .subscriber-count {
            font-size: 14px;
            color: #606060;
            margin: 4px 0 0 0;
        }

        .subscribe-button {
            background-color: #cc0000;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 2px;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            cursor: pointer;
        }

        .channel-tabs {
            background-color: white;
            padding: 0 80px;
            display: flex;
            border-bottom: 1px solid #e1e1e1;
        }

        .channel-tabs a {
            padding: 16px 20px;
            text-decoration: none;
            color: #606060;
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 3px solid transparent;
        }

        .channel-tabs a.active {
            color: #030303;
            border-bottom: 3px solid #606060;
        }

        .main-content {
            padding: 24px 80px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .latest-video-section, .playlists-section {
            background-color: white;
            padding: 16px;
            border-radius: 4px;
        }

        .latest-video-thumbnail {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .latest-video-title {
            font-size: 18px;
            font-weight: 500;
            margin: 0 0 8px 0;
        }

        .video-meta {
            font-size: 14px;
            color: #606060;
            margin: 0;
        }

        .playlist-item {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-start;
        }

        .playlist-thumbnail {
            width: 120px;
            height: 68px;
            border-radius: 4px;
            margin-right: 12px;
        }

        .playlist-details {
            flex: 1;
        }

        .playlist-title {
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 4px 0;
        }

        .playlist-meta {
            font-size: 12px;
            color: #606060;
            margin: 0;
        }
    </style>
</head>
<body>

    <header class="channel-header">
        <img src="IMG_5177.png" alt="Grapevine Garden Channel Banner" class="channel-banner">
        <div class="channel-info-bar">
            <div class="channel-info-left">
                <img src="avatar.jpg" alt="Grapevine Garden Profile Avatar" class="profile-avatar">
                <div>
                    <h1 class="channel-name">GrapevineGarden</h1>
                    <p class="subscriber-count">18.8K subscribers</p>
                </div>
            </div>
            <button class="subscribe-button">Subscribe</button>
        </div>
        <nav class="channel-tabs">
            <a href="#" class="active">Home</a>
            <a href="#">Videos</a>
            <a href="#">Playlists</a>
            <a href="#">Community</a>
            <a href="#">Channels</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main class="main-content">
        <section class="latest-video-section">
            <img src="latest_video_thumb.jpg" alt="Latest Video Thumbnail" class="latest-video-thumbnail">
            <h2 class="latest-video-title">How To Deten antions For Its Grapevine Garden Renonus</h2>
            <p class="video-meta">188K views &bull; 7 days ago</p>
        </section>

        <section class="playlists-section">
            <h2>Playlists</h2>
            <div class="playlist-item">
                <img src="playlist1_thumb.jpg" alt="Playlist Thumbnail" class="playlist-thumbnail">
                <div class="playlist-details">
                    <p class="playlist-title">Grapevine Garden</p>
                    <p class="playlist-meta">47.5K views</p>
                </div>
            </div>
            <div class="playlist-item">
                <img src="playlist2_thumb.jpg" alt="Playlist Thumbnail" class="playlist-thumbnail">
                <div class="playlist-details">
                    <p class="playlist-title">Grapevine Garden</p>
                    <p class="playlist-meta">1.29K views</p>
                </div>
            </div>
            <!-- Add more playlist items here -->
        </section>
    </main>

</body>
</html>
